<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XrayClient with proxy by GrifON</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@300;500&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'JetBrains Mono', monospace;
  background: #0a0a0f;
  color: #c0c0e0;
  padding: 24px;
  max-width: 720px;
  margin: 0 auto;
  position: relative;
  overflow-x: hidden;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  z-index: -2;
  background: #0a0a0f;
}

body::after {
  content: "";
  position: fixed;
  inset: 0;
  z-index: -1;
  background-image:
    repeating-linear-gradient(0deg, transparent, transparent 40px, rgba(0,255,247,0.015) 40px, rgba(0,255,247,0.015) 41px),
    repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(255,102,0,0.015) 40px, rgba(255,102,0,0.015) 41px);
  pointer-events: none;
}

.tiled-bg {
  position: fixed;
  inset: 0;
  z-index: -1;
  pointer-events: none;
  overflow: hidden;
  opacity: 0.04;
  font-family: 'Orbitron', monospace;
  font-weight: 900;
  font-size: 60px;
  line-height: 1.2;
  color: #00fff7;
  display: flex;
  flex-wrap: wrap;
  align-content: flex-start;
  padding: 10px;
  user-select: none;
}

.scanlines {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.15) 2px, rgba(0,0,0,0.15) 4px);
}

h1 {
  font-family: 'Orbitron', monospace;
  font-size: 1.1rem;
  margin-bottom: 24px;
  color: #00fff7;
  text-align: center;
  text-shadow: 0 0 20px rgba(0,255,247,0.5), 0 0 60px rgba(0,255,247,0.2);
  letter-spacing: 3px;
  text-transform: uppercase;
  position: relative;
  padding-bottom: 12px;
}

h1::after {
  content: "";
  position: absolute;
  bottom: 0;
  left: 10%;
  width: 80%;
  height: 1px;
  background: linear-gradient(90deg, transparent, #00fff7, #ff6600, transparent);
}

.card {
  background: rgba(12, 12, 24, 0.85);
  border: 1px solid rgba(0, 255, 247, 0.15);
  border-radius: 4px;
  padding: 20px;
  margin-bottom: 20px;
  backdrop-filter: blur(4px);
  box-shadow: 0 0 15px rgba(0,255,247,0.05), inset 0 0 30px rgba(0,255,247,0.02);
  position: relative;
  z-index: 1;
}

.card::before {
  content: "";
  position: absolute;
  top: -1px; left: 20%;
  width: 60%;
  height: 1px;
  background: linear-gradient(90deg, transparent, #00fff7, transparent);
  opacity: 0.6;
}

.card h2 {
  font-family: 'Orbitron', monospace;
  font-size: 0.7rem;
  margin-bottom: 12px;
  color: #ff6600;
  letter-spacing: 2px;
  text-transform: uppercase;
  text-shadow: 0 0 10px rgba(255,102,0,0.3);
}

.input-row { display: flex; gap: 8px; }
.input-row input {
  flex: 1;
  background: rgba(0, 255, 247, 0.03);
  border: 1px solid rgba(0, 255, 247, 0.15);
  border-radius: 2px;
  padding: 10px 12px;
  color: #00fff7;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.85rem;
  outline: none;
  transition: border-color 0.3s, box-shadow 0.3s;
}
.input-row input:focus { border-color: #00fff7; box-shadow: 0 0 12px rgba(0,255,247,0.15), inset 0 0 12px rgba(0,255,247,0.05); }
.input-row input::placeholder { color: rgba(0,255,247,0.2); }

.btn {
  padding: 10px 18px;
  border: none;
  border-radius: 2px;
  font-family: 'Orbitron', monospace;
  font-size: 0.7rem;
  cursor: pointer;
  white-space: nowrap;
  letter-spacing: 1px;
  text-transform: uppercase;
  transition: all 0.3s;
  position: relative;
  overflow: hidden;
}

.btn-primary {
  background: transparent;
  color: #00fff7;
  border: 1px solid #00fff7;
  box-shadow: 0 0 10px rgba(0,255,247,0.1);
}
.btn-primary:hover { background: rgba(0,255,247,0.1); box-shadow: 0 0 20px rgba(0,255,247,0.3); }

.btn-danger {
  background: transparent;
  color: #ff6600;
  border: 1px solid #ff6600;
  padding: 4px 10px;
  font-size: 0.6rem;
  box-shadow: 0 0 8px rgba(255,102,0,0.1);
}
.btn-danger:hover { background: rgba(255,102,0,0.15); box-shadow: 0 0 16px rgba(255,102,0,0.3); }

.btn-success {
  background: transparent;
  color: #00fff7;
  border: 1px solid #00fff7;
  width: 100%;
  box-shadow: 0 0 15px rgba(0,255,247,0.1);
}
.btn-success:hover { background: rgba(0,255,247,0.1); box-shadow: 0 0 30px rgba(0,255,247,0.3); }

.btn:disabled { opacity: 0.3; cursor: not-allowed; }

.sub-list { list-style: none; }
.sub-list li {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 0;
  border-bottom: 1px solid rgba(0, 255, 247, 0.06);
  word-break: break-all;
}
.sub-list li:last-child { border-bottom: none; }
.sub-list li .url { flex: 1; font-size: 0.78rem; color: #8080a0; }
.sub-list li.disabled { opacity: 0.3; }
.sub-list li.disabled .url { text-decoration: line-through; }

.btn-toggle {
  background: transparent;
  color: #ff6600;
  padding: 4px 8px;
  font-size: 0.6rem;
  border: 1px solid rgba(255,102,0,0.3);
  border-radius: 2px;
  cursor: pointer;
  font-family: 'Orbitron', monospace;
  letter-spacing: 1px;
  transition: all 0.3s;
}
.btn-toggle:hover { border-color: #ff6600; box-shadow: 0 0 10px rgba(255,102,0,0.2); }
.btn-toggle.on { border-color: #00fff7; color: #00fff7; }
.btn-toggle.on:hover { box-shadow: 0 0 10px rgba(0,255,247,0.2); }

.empty { color: rgba(255,102,0,0.3); font-size: 0.8rem; text-align: center; padding: 20px 0; letter-spacing: 1px; }

.status-dot { display: inline-block; width: 6px; height: 6px; border-radius: 0; margin-right: 8px; flex-shrink: 0; }
.status-dot.alive { background: #00fff7; box-shadow: 0 0 8px #00fff7; }
.status-dot.dead { background: #ff6600; box-shadow: 0 0 8px #ff6600; }
.status-dot.checking { background: #8000ff; box-shadow: 0 0 8px #8000ff; animation: pulse 1s infinite; }

@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }

.sub-list li .tag { font-size: 0.65rem; color: rgba(128,0,255,0.6); margin-right: 8px; font-family: 'Orbitron', monospace; }

#output {
  background: rgba(0,0,0,0.6);
  border: 1px solid rgba(0, 255, 247, 0.1);
  border-radius: 2px;
  padding: 12px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.75rem;
  white-space: pre-wrap;
  max-height: 300px;
  overflow-y: auto;
  color: #00fff7;
  margin-top: 12px;
  display: none;
}
#output.error { color: #ff6600; border-color: rgba(255,102,0,0.3); }

.spinner {
  display: none;
  width: 16px;
  height: 16px;
  border: 1px solid rgba(0, 255, 247, 0.15);
  border-top-color: #00fff7;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto;
  box-shadow: 0 0 10px rgba(0,255,247,0.1);
}

@keyframes spin { to { transform: rotate(360deg); } }

#xrayLog {
  background: rgba(0,0,0,0.6);
  border: 1px solid rgba(0, 255, 247, 0.08);
  border-radius: 2px;
  padding: 12px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  white-space: pre-wrap;
  max-height: 400px;
  overflow-y: auto;
  color: #8080c0;
  margin: 0;
}

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: rgba(0,0,0,0.3); }
::-webkit-scrollbar-thumb { background: rgba(0,255,247,0.2); }
::-webkit-scrollbar-thumb:hover { background: rgba(0,255,247,0.4); }
</style>
</head>
<body>
<div class="tiled-bg" id="tiledBg"></div>
<div class="scanlines"></div>
<h1>XrayClient with proxy by GrifON</h1>

<div class="card">
  <h2>Добавить подписку</h2>
  <div class="input-row">
    <input type="url" id="urlInput" placeholder="https://example.com/sub/link" autocomplete="off">
    <button class="btn btn-primary" id="addBtn">Добавить</button>
  </div>
</div>

<div class="card">
  <h2>Текущие подписки</h2>
  <ul class="sub-list" id="subList">
    <li class="empty">Загрузка...</li>
  </ul>
</div>

<div class="card">
  <h2>Серверы добавленные в конфигурацию</h2>
  <ul class="sub-list" id="serverList">
    <li class="empty">Загрузка...</li>
  </ul>
  <button class="btn btn-primary" style="margin-top:12px;width:100%;" onclick="loadServers()">Проверить доступность</button>
</div>

<div class="card">
  <h2>Пользователи SOCKS5</h2>
  <div class="input-row" style="margin-bottom:12px;">
    <input type="text" id="userInput" placeholder="логин" autocomplete="off" style="flex:0.4;">
    <input type="password" id="passInput" placeholder="пароль" autocomplete="off">
    <button class="btn btn-primary" id="addUserBtn">Добавить</button>
  </div>
  <ul class="sub-list" id="userList">
    <li class="empty">Загрузка...</li>
  </ul>
</div>

<div class="card">
  <h2>Клиенты VLESS</h2>
  <div class="input-row" style="margin-bottom:12px;">
    <input type="text" id="remarkInput" placeholder="имя клиента" autocomplete="off">
    <button class="btn btn-primary" id="addClientBtn">Создать</button>
  </div>
  <ul class="sub-list" id="clientList">
    <li class="empty">Загрузка...</li>
  </ul>
</div>

<div class="card">
  <button class="btn btn-success" id="updateBtn">Запустить обновление Xray</button>
  <div class="spinner" id="spinner"></div>
  <pre id="output"></pre>
</div>

<div class="card">
  <h2>Лог Xray</h2>
  <button class="btn btn-primary" style="margin-bottom:12px;width:100%;" onclick="loadLogs()">Обновить лог</button>
  <pre id="xrayLog" style="background:#0a0a0a;border:1px solid #2a2a2a;border-radius:6px;padding:12px;font-family:'Cascadia Code','Fira Code',monospace;font-size:0.75rem;white-space:pre-wrap;max-height:400px;overflow-y:auto;color:#aaa;margin:0;">Загрузка...</pre>
</div>

<script>
const API_BASE = '';

(function() {
  const bg = document.getElementById('tiledBg');
  const word = 'GrifON';
  let html = '';
  for (let i = 0; i < 800; i++) {
    html += word + ' ';
  }
  bg.textContent = html;
})();

async function loadSubs() {
  const res = await fetch(`${API_BASE}/api/subscriptions`);
  const data = await res.json();
  const list = document.getElementById('subList');
  if (data.length === 0) {
    list.innerHTML = '<li class="empty">Нет подписок</li>';
    return;
  }
  list.innerHTML = data.map((entry, i) =>
    `<li class="${entry.enabled ? '' : 'disabled'}">
      <span class="url">${escapeHtml(entry.url)}</span>
      <button class="btn-toggle ${entry.enabled ? 'on' : 'off'}" onclick="toggleSub(${i})">${entry.enabled ? 'вкл' : 'выкл'}</button>
      <button class="btn btn-danger" onclick="removeSub(${i})">✕</button>
    </li>`
  ).join('');
}

function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

async function addSub() {
  const input = document.getElementById('urlInput');
  const url = input.value.trim();
  if (!url) return;
  document.getElementById('addBtn').disabled = true;
  try {
    const res = await fetch(`${API_BASE}/api/subscriptions`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({url})
    });
    if (!res.ok) { const err = await res.text(); alert('Ошибка: ' + err); return; }
    input.value = '';
    await loadSubs();
  } catch (e) {
    alert('Ошибка: ' + e.message);
  } finally {
    document.getElementById('addBtn').disabled = false;
  }
}

async function removeSub(index) {
  if (!confirm('Удалить эту подписку?')) return;
  try {
    const res = await fetch(`${API_BASE}/api/subscriptions/${index}`, { method: 'DELETE' });
    if (!res.ok) { const err = await res.text(); alert('Ошибка: ' + err); return; }
    await loadSubs();
  } catch (e) {
    alert('Ошибка: ' + e.message);
  }
}

async function toggleSub(index) {
  try {
    const res = await fetch(`${API_BASE}/api/subscriptions/toggle/${index}`, { method: 'PATCH' });
    if (!res.ok) { const err = await res.text(); alert('Ошибка: ' + err); return; }
    await loadSubs();
  } catch (e) {
    alert('Ошибка: ' + e.message);
  }
}

async function loadUsers() {
  const list = document.getElementById('userList');
  try {
    const res = await fetch(`${API_BASE}/api/users`);
    const data = await res.json();
    if (data.length === 0) {
      list.innerHTML = '<li class="empty">Нет пользователей</li>';
      return;
    }
    list.innerHTML = data.map((u, i) =>
      `<li>
        <span class="url" style="flex:0.4;">${escapeHtml(u.user)}</span>
        <span class="url" style="flex:0.4;color:#666;">${escapeHtml(u.pass)}</span>
        <button class="btn btn-danger" onclick="removeUser(${i})">✕</button>
      </li>`
    ).join('');
  } catch (e) {
    list.innerHTML = '<li class="empty">Ошибка загрузки</li>';
  }
}

async function addUser() {
  const user = document.getElementById('userInput').value.trim();
  const pass = document.getElementById('passInput').value.trim();
  if (!user || !pass) return;
  document.getElementById('addUserBtn').disabled = true;
  try {
    const res = await fetch(`${API_BASE}/api/users`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({user, pass})
    });
    if (!res.ok) { const err = await res.text(); alert('Ошибка: ' + err); return; }
    document.getElementById('userInput').value = '';
    document.getElementById('passInput').value = '';
    await loadUsers();
  } catch (e) {
    alert('Ошибка: ' + e.message);
  } finally {
    document.getElementById('addUserBtn').disabled = false;
  }
}

async function removeUser(index) {
  if (!confirm('Удалить пользователя?')) return;
  try {
    const res = await fetch(`${API_BASE}/api/users/${index}`, { method: 'DELETE' });
    if (!res.ok) { const err = await res.text(); alert('Ошибка: ' + err); return; }
    await loadUsers();
  } catch (e) {
    alert('Ошибка: ' + e.message);
  }
}

async function loadServers() {
  const list = document.getElementById('serverList');
  list.innerHTML = '<li class="empty"><span class="status-dot checking"></span>Проверка...</li>';
  try {
    const res = await fetch(`${API_BASE}/api/servers`);
    const data = await res.json();
    if (data.length === 0) {
      list.innerHTML = '<li class="empty">Нет серверов в config.json</li>';
      return;
    }
    list.innerHTML = data.map(s =>
      `<li>
        <span class="status-dot ${s.reachable ? 'alive' : 'dead'}"></span>
        <span class="tag">${escapeHtml(s.tag)}</span>
        <span class="url">${escapeHtml(s.address)}:${s.port}</span>
      </li>`
    ).join('');
  } catch (e) {
    list.innerHTML = '<li class="empty">Ошибка загрузки</li>';
  }
}

async function runUpdate() {
  const btn = document.getElementById('updateBtn');
  const spinner = document.getElementById('spinner');
  const output = document.getElementById('output');
  btn.disabled = true;
  spinner.style.display = 'block';
  output.style.display = 'none';
  output.className = '';
  try {
    const res = await fetch(`${API_BASE}/api/update`, { method: 'POST' });
    const text = await res.text();
    output.textContent = text;
    output.style.display = 'block';
    if (!res.ok) output.classList.add('error');
    if (res.ok) await loadSubs();
  } catch (e) {
    output.textContent = 'Ошибка: ' + e.message;
    output.style.display = 'block';
    output.classList.add('error');
  } finally {
    btn.disabled = false;
    spinner.style.display = 'none';
  }
}

async function loadLogs() {
  const el = document.getElementById('xrayLog');
  el.textContent = 'Загрузка...';
  try {
    const res = await fetch(`${API_BASE}/api/logs`);
    const data = await res.json();
    const lines = data.lines || [];
    el.textContent = lines.join('') || '(лог пуст)';
    el.scrollTop = el.scrollHeight;
  } catch (e) {
    el.textContent = 'Ошибка: ' + e.message;
  }
}

let clientsData = [];

async function loadClients() {
  const list = document.getElementById('clientList');
  try {
    const res = await fetch(`${API_BASE}/api/clients`);
    clientsData = await res.json();
    if (clientsData.length === 0) {
      list.innerHTML = '<li class="empty">Нет VLESS клиентов</li>';
      return;
    }
    list.innerHTML = clientsData.map((c, i) =>
      `<li>
        <span class="url" style="flex:0.3;font-size:0.7rem;">${escapeHtml(c.remark)}</span>
        <span class="url" style="font-size:0.65rem;color:#666;word-break:break-all;">${escapeHtml(c.id)}</span>
        <button class="btn btn-danger" onclick="deleteClient(${i})" title="Удалить">✕</button>
        <button class="btn btn-primary" style="padding:4px 8px;font-size:0.6rem;" onclick="copyVless(${i})">URI</button>
      </li>`
    ).join('');
  } catch (e) {
    list.innerHTML = '<li class="empty">Ошибка загрузки</li>';
  }
}

function copyVless(i) {
  const c = clientsData[i];
  if (!c) return;
  const vless = `vless://${c.id}@SERVER_IP:PORT?type=tcp&encryption=none&security=none#${encodeURIComponent(c.remark)}`;
  prompt('Скопируйте VLESS URI:', vless);
}

async function addClient() {
  const remark = document.getElementById('remarkInput').value.trim();
  document.getElementById('addClientBtn').disabled = true;
  try {
    const res = await fetch(`${API_BASE}/api/clients`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({remark: remark || 'client'})
    });
    if (!res.ok) { const err = await res.text(); alert('Ошибка: ' + err); return; }
    const data = await res.json();
    document.getElementById('remarkInput').value = '';
    await loadClients();
    alert(`Создан UUID: ${data.id}`);
  } catch (e) {
    alert('Ошибка: ' + e.message);
  } finally {
    document.getElementById('addClientBtn').disabled = false;
  }
}

async function deleteClient(index) {
  if (!confirm('Удалить VLESS клиента?')) return;
  try {
    const res = await fetch(`${API_BASE}/api/clients/${index}`, { method: 'DELETE' });
    if (!res.ok) { const err = await res.text(); alert('Ошибка: ' + err); return; }
    await loadClients();
  } catch (e) {
    alert('Ошибка: ' + e.message);
  }
}

document.getElementById('addBtn').addEventListener('click', addSub);
document.getElementById('urlInput').addEventListener('keydown', e => { if (e.key === 'Enter') addSub(); });
document.getElementById('addUserBtn').addEventListener('click', addUser);
document.getElementById('passInput').addEventListener('keydown', e => { if (e.key === 'Enter') addUser(); });
document.getElementById('addClientBtn').addEventListener('click', addClient);
document.getElementById('remarkInput').addEventListener('keydown', e => { if (e.key === 'Enter') addClient(); });
document.getElementById('updateBtn').addEventListener('click', runUpdate);

loadSubs();
loadServers();
loadUsers();
loadClients();
loadLogs();
</script>
</body>
</html>
